<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav id="navbar">
      <h1>Digital Dashboard</h1>
      <ul class="nav-links">
        <li>Home</li>
        <li>Profile</li>
        <li>Logout</li>
      </ul>
    </nav>

    <!-- Main Dashboard Layout -->
    <div class="dashboard">
      <!-- Sidebar -->
      <div class="sidebar">
        <h3>Menu</h3>
        <ul>
          <li>Dashboard</li>
          <li>Users</li>
          <li>Courses</li>
          <li>Settings</li>
        </ul>
      </div>
    </div>

    <!-- Main Content -->
     <main class="main-content">
        <h1>Welcome Admin</h1>

        <!-- Cards Section -->
         <section class="cards">
            <div class="card">
                <h2>1200+</h2>
                <p>Total Students</p>
            </div>
            <div class="card">
                <h2>85</h2>
                <p>Courses Sold</p>
            </div>
            <div class="card special-card">
                <span class="badge">New</span>
                <h2>45</h2>
                <p>Pending Tasks</p>
            </div>
            </div>
         </section>
     </main>
  
  </body>
</html>
