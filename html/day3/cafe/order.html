<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order</title>
</head>
<body>
    <form>
        <label>Name:</label>
        <input type="text" name="name" required placeholder="Enter your name"><br><br>
       <label>Location:</label>
        <input type="text" name="location" required placeholder="Enter your location"><br><br>
        <label>Phone:</label>
        <input type="text" name="phone" required maxlength="10" placeholder="Enter your phone"><br><br>
        <label>Payment Method:</label>
        <select>
            <option>Cash on Delivery</option>
            <option>Online</option>
        </select><br><br>
        <label>Select type of Coffee:</label>
        <select>
            <option>Espresso</option>
            <option>Cappuccino</option>
            <option>Latte</option>
            <option>Mocha</option>
        </select><br><br>
        <button type="submit">Order Now</button>
    
</body>
</html>
