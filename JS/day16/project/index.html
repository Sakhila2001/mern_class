<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank Account Project</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container{
      background: white;
      width: 350px;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    input{
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    button{
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      color: white;
    }

    .deposit{
      background: #28a745;
    }

    .withdraw{
      background: #dc3545;
    }

    .balance-btn{
      background: #007bff;
    }

    .output{
      margin-top: 20px;
      background: #f1f1f1;
      padding: 15px;
      border-radius: 5px;
      min-height: 60px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Bank Account</h1>

    <input type="number" id="amount" placeholder="Enter Amount">

    <button class="deposit" onclick="depositMoney()">
      Deposit
    </button>

    <button class="withdraw" onclick="withdrawMoney()">
      Withdraw
    </button>

    <button class="balance-btn" onclick="showBalance()">
      Check Balance
    </button>

    <div class="output" id="output">
      Welcome to the bank.
    </div>
  </div>

<script src="app.js"></script>
