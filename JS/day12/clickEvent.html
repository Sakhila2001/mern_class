<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS event</title>
    <style></style>
  </head>
  <body>
    <h1>Js Event + Event Object</h1>
    <!-- Click event code -->
    <button id="btn">Click Me!(Id)</button>
    <br />
    <br />
    <button class="btn">Click Me!(class)</button>

    <script>
      const btn = document.getElementById("btn");
      btn.addEventListener("click", function () {
        alert("button clicked");
      });
      const btnClass = document.getElementsByClassName("btn");
      btnClass[0].addEventListener("click", function () {
        alert("button clicked");
      });
    </script>
  </body>
</html>
